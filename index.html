<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#141414">
    <meta name="description" content="Selecione o perfil para começar a assistir na Netflix">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Netflix - Selecionar Perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle-container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar entre modo claro e escuro">
            <span>☀️</span>
        </button>
    </div>
    <main>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponíveis">
            <ul class="profiles">
                <li>
                    <a href="catalogo/catalogo.html" class="profile" data-profile-id="wagner" data-profile-name="Wagner" data-profile-img="assets/perfil-1.jpg">
                        <figure>
                            <img src="assets/perfil-1.jpg" alt="Um personagem de aparência gótica e caricata, com cabelos roxos e monóculo, posa em um cenário fantástico de miniaturas sombrias iluminadas por velas.">
                        </figure>
                        <figcaption>Wagner</figcaption>
                    </a>
                </li>
                <li>
                    <a href="catalogo/catalogo.html" class="profile" data-profile-id="luana" data-profile-name="Luana" data-profile-img="assets/perfil-2.jpg">
                        <figure>
                            <img src="assets/perfil-2.jpg" alt="Imagem de um boné azul">
                        </figure>
                        <figcaption>Luana</figcaption>
                    </a>
                </li>
                <li>
                    <a href="catalogo/catalogo.html" class="profile" data-profile-id="billy" data-profile-name="Billy" data-profile-img="assets/perfil-3.jpg">
                        <figure>
                            <img src="assets/perfil-3.jpg" alt="Imagem de um boné azul">
                        </figure>
                        <figcaption>Billy</figcaption>
                    </a>
                </li>
                <li>
                    <a href="catalogo/catalogo.html" class="profile" data-profile-id="luis" data-profile-name="Luís" data-profile-img="assets/perfil-4.jpg">
                        <figure>
                            <img src="assets/perfil-4.jpg" alt="Imagem de um boné azul">
                        </figure>
                        <figcaption>Luís</figcaption>
                    </a>
                </li>
            </ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
